<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Generate Icons</title></head>
<body style="padding:30px;font-family:Cairo,sans-serif;text-align:center;">
<h2>اضغط على كل زر لتحميل الأيقونة</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc;margin:10px;"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc;margin:10px;"></canvas>
<br>
<button onclick="dl('c192','icon-192.png')" style="padding:10px 20px;font-size:16px;margin:8px;">⬇ تحميل 192x192</button>
<button onclick="dl('c512','icon-512.png')" style="padding:10px 20px;font-size:16px;margin:8px;">⬇ تحميل 512x512</button>
<script>
function draw(id) {
  const c = document.getElementById(id);
  const s = c.width;
  const ctx = c.getContext('2d');
  // Background
  ctx.fillStyle = '#0D2137';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s*0.15);
  ctx.fill();
  // Fish emoji
  ctx.font = `${s*0.35}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐟', s/2, s*0.38);
  // Text
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${s*0.13}px Cairo, sans-serif`;
  ctx.fillText('الخزرجي', s/2, s*0.72);
}
draw('c192');
draw('c512');
function dl(id, name) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
